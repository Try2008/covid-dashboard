<div class="chart-card">
  <div class="card-header">
    <div class="title-with-info">
      <h3 class="card-title">{{ title }}</h3>
      <span
        class="info-icon"
        *ngIf="tooltipText && !isPlaceholder"
        [attr.data-tooltip]="tooltipText"
        [attr.aria-label]="tooltipText"
        tabindex="0"
        role="tooltip"
      >i</span>
    </div>
    <div class="menu-dots">
      <span class="material-icons">more_vert</span>
    </div>
  </div>
  
  <div class="month-filter" *ngIf="hasMonthFilter && !isPlaceholder">
    <button class="filter-btn">
      <span>חודש אחרון</span>
      <span class="material-icons">expand_more</span>
    </button>
  </div>

  <!-- גרף אמיתי -->
  <div class="chart-container" *ngIf="!isPlaceholder">
    <highcharts-chart
      [options]="chartOptions!"
      class="responsive-chart"
    ></highcharts-chart>
  </div>

  <!-- Placeholder -->
  <div class="placeholder-content" *ngIf="isPlaceholder">
    <span class="material-icons placeholder-icon">insert_chart</span>
    <p class="placeholder-text">Chart Placeholder</p>
  </div>
</div>
