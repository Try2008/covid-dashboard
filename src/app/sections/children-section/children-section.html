<app-dashboard-section title="תחלואה ואשפוזי ילדים" [hasLinks]="true">
  <div class="charts-grid-2">
    <app-chart-card
      title="מגמת ילדים מאומתים לפי קבוצות גיל"
      tooltipText="מגמת המאומתים בקרב ילדים לפי קבוצות גיל לאורך הזמן"
      [chartOptions]="childrenTrendOptions"
      [hasMonthFilter]="true"
    ></app-chart-card>
    <app-chart-card
      title="ילדים מאושפזים לפי קבוצות גיל"
      [isPlaceholder]="true"
    ></app-chart-card>
  </div>
</app-dashboard-section>
